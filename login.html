<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SmartExam – Admin Login</title>
  <meta name="description" content="SmartExam Exam Hall Seat Allocation System – Secure admin login portal."/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Particle canvas bg */
    #canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35}
  </style>
</head>
<body class="login-page">
  <canvas id="canvas"></canvas>
  <div class="grid-bg"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1>SmartExam</h1>
        <p>Exam Hall Seat Allocation System</p>
      </div>

      <!-- Body -->
      <div class="login-body">
        <div class="login-error" id="loginError">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="errorMsg">Invalid credentials. Please try again.</span>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="username">Admin Username</label>
            <div class="input-wrap">
              <svg class="ico" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <input type="text" id="username" autocomplete="username" placeholder="Enter your username" required/>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Unique Admin ID</label>
            <div class="input-wrap">
              <svg class="ico" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" id="password" autocomplete="current-password" placeholder="Enter your unique ID" required/>
              <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
                <svg id="eyeIcon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
            <span class="spinner"></span>
            <span class="btn-text">Sign In to Dashboard</span>
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        SmartExam v1.0 &nbsp;•&nbsp; Academic Administration Portal &nbsp;•&nbsp; 2024
      </div>
    </div>
  </div>

  <script>
    /* ── Admin credentials (username → password) ── */
    const ADMINS = {
      'admin':    'ADMIN2024',
      'principal':'PRIN@001',
      'examcell': 'EXAM#2024',
      'dr.kumar': 'KUMAR@99'
    };

    /* ── Particle canvas ── */
    (function(){
      const c=document.getElementById('canvas'),ctx=c.getContext('2d');
      let W,H,pts=[];
      const resize=()=>{c.width=W=innerWidth;c.height=H=innerHeight;init()};
      const rand=(a,b)=>Math.random()*(b-a)+a;
      function init(){pts=[];for(let i=0;i<60;i++)pts.push({x:rand(0,W),y:rand(0,H),vx:rand(-0.3,0.3),vy:rand(-0.3,0.3),r:rand(1,2.5)})}
      function draw(){
        ctx.clearRect(0,0,W,H);
        pts.forEach(p=>{
          p.x+=p.vx;p.y+=p.vy;
          if(p.x<0||p.x>W)p.vx*=-1;
          if(p.y<0||p.y>H)p.vy*=-1;
          ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle='rgba(52,152,219,0.7)';ctx.fill();
        });
        pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
          const d=Math.hypot(a.x-b.x,a.y-b.y);
          if(d<120){ctx.strokeStyle=`rgba(52,152,219,${1-d/120})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
        }));
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize',resize);resize();draw();
    })();

    /* ── Eye toggle ── */
    const eye=document.getElementById('eyeBtn'),pw=document.getElementById('password');
    eye.addEventListener('click',()=>{
      const show=pw.type==='password';
      pw.type=show?'text':'password';
      document.getElementById('eyeIcon').innerHTML=show
        ?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    /* ── Login ── */
    const form=document.getElementById('loginForm'),
          errBox=document.getElementById('loginError'),
          errMsg=document.getElementById('errorMsg'),
          loginBtn=document.getElementById('loginBtn');

    function showError(msg){
      errMsg.textContent=msg;
      errBox.classList.add('show');
      document.getElementById('username').parentElement.parentElement.querySelector('input').style.borderColor='var(--danger)';
    }
    function clearError(){
      errBox.classList.remove('show');
    }

    document.getElementById('username').addEventListener('input',clearError);
    document.getElementById('password').addEventListener('input',clearError);

    form.addEventListener('submit',e=>{
      e.preventDefault();
      const u=document.getElementById('username').value.trim().toLowerCase();
      const p=document.getElementById('password').value.trim();
      if(!u||!p){showError('Both fields are required.');return;}
      loginBtn.classList.add('loading');
      setTimeout(()=>{
        loginBtn.classList.remove('loading');
        if(ADMINS[u]&&ADMINS[u]===p){
          localStorage.setItem('se_auth',JSON.stringify({user:u,time:Date.now()}));
          window.location.href='dashboard.html';
        } else {
          showError('Invalid username or ID. Please check your credentials.');
          document.getElementById('password').value='';
          document.getElementById('password').focus();
        }
      },900);
    });

    /* Enter key */
    document.addEventListener('keydown',e=>{if(e.key==='Enter')form.requestSubmit()});
  </script>
</body>
</html>
